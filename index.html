    <style>
        /* Moody Vintage / Dark Cottagecore Styles */
        :root {
            --primary-color: #8c4b38; /* Rustic Brick / Terracotta */
            --primary-hover: #6e3929;
            --accent-color: #4a5e4d; /* Forest Green */
            --gold-accent: #c29b62; /* Antique Brass/Gold */
            --text-color: #362f2d; /* Dark Espresso */
            --heading-color: #1c1815; /* Almost Black */
            --bg-color: #242220; /* Dark warm charcoal */
            --card-bg: #f4efe6; /* Old Parchment */
            --border-color: #d4c8b8;
            --radius: 4px; /* Classic, barely rounded corners */
        }

        body {
            font-family: 'Crimson Pro', serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 4px);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography Override */
        h1, h2, h3, h4, .username {
            font-family: 'Fraunces', serif;
            color: var(--heading-color);
            font-weight: 600;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Top Navigation - Moody & Elegant */
        .top-nav {
            background-color: var(--bg-color);
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(194, 155, 98, 0.3); /* Subtle gold line */
        }

        .top-nav a {
            color: var(--card-bg);
            text-decoration: none;
            font-size: 0.95rem;
            font-family: 'Fraunces', serif;
            letter-spacing: 1px;
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .top-nav a:hover {
            color: var(--gold-accent);
        }

        /* Header */
        header {
            padding: 70px 0 50px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 3.8rem;
            color: var(--gold-accent);
            letter-spacing: -1px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        header h1:hover {
            opacity: 0.8;
        }

        header p {
            margin: 15px auto 0;
            font-size: 1.2rem;
            color: var(--card-bg);
            font-style: italic;
            max-width: 450px;
            border-top: 1px solid rgba(194, 155, 98, 0.3);
            padding-top: 15px;
        }

        /* Post Cards */
        .post-card,
        .single-post {
            background: var(--card-bg);
            border-radius: var(--radius);
            margin-bottom: 60px;
            border: 1px solid var(--border-color);
            /* Vintage frame drop shadow */
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .post-card {
            cursor: pointer;
        }

        .post-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.5);
        }

        .single-post {
            cursor: default;
        }

        .post-header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background-color: #fcf9f2;
        }

        .post-header img.avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 15px;
            background-color: var(--border-color);
            object-fit: cover;
            border: 2px solid var(--gold-accent);
        }

        .post-header .username {
            font-size: 1.3rem;
            color: var(--heading-color);
            font-style: italic;
        }

        .post-image {
            width: calc(100% - 40px);
            margin: 20px auto 0;
            display: block;
            max-height: 480px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #fff;
            padding: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .post-content {
            padding: 30px 40px;
            font-size: 1.15rem;
        }

        .post-content h1,
        .post-content h2 {
            font-size: 2.4rem;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--heading-color);
        }

        .post-content p {
            margin-bottom: 25px;
        }

        .post-content a {
            color: var(--primary-color);
            text-decoration: underline;
            text-decoration-color: rgba(140, 75, 56, 0.4);
            text-underline-offset: 4px;
            transition: all 0.3s ease;
        }

        .post-content a:hover {
            color: var(--primary-hover);
            text-decoration-color: var(--primary-hover);
        }

        .post-footer {
            padding: 20px 40px;
            color: #7d7268;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background-color: #fcf9f2;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 1.05rem;
        }

        /* Single Post Overrides */
        .single-post .post-image {
            max-height: none;
        }

        /* Back Button - Vintage Style */
        .back-button {
            display: inline-flex;
            align-items: center;
            margin-bottom: 25px;
            color: var(--gold-accent);
            text-decoration: none;
            font-family: 'Fraunces', serif;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 0;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            color: #fff;
            transform: translateX(-5px);
        }

        /* Refined inline styles for vintage theme */
        .post-content div[style*="background"] {
            background: #ebe3d5 !important;
            border: 1px solid var(--border-color) !important;
            border-radius: var(--radius) !important;
            padding: 25px 30px !important;
            margin: 35px 0 !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02) !important;
        }
        
        .post-content h3[style*="border-left"] {
            border-left: 3px solid var(--primary-color) !important;
            color: var(--heading-color) !important;
            padding-left: 15px !important;
        }

        .post-content h4[style*="background"] {
            background: rgba(140, 75, 56, 0.1) !important;
            color: var(--heading-color) !important;
            border: 1px solid rgba(140, 75, 56, 0.2) !important;
            border-radius: 4px !important;
            padding: 10px 15px !important;
        }

        .post-content span[style*="background"] {
            background: #fff !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 4px !important;
            font-family: 'Fraunces', serif;
            font-size: 0.9rem !important;
            padding: 4px 10px !important;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05) !important;
            transform: none !important;
        }
    </style>

                excerpt: 'Transform your formal dining room into a stunning focal point with wall decor that blends classic elegance and cozy charm. Whether you love the timeless appeal of blue and white china displays, rustic floating shelves, or curated gallery walls, the right accents bring character to every meal.',
                content : `
                <p>A warm, character-filled dining room has a way of making everyday meals feel more meaningful. With rustic wooden furniture, open shelving, blue and white ceramics, vintage framed art, and fresh greenery, this style captures the charm of a lived-in home rather than a staged showroom. It is relaxed, layered, and deeply inviting, blending cottage dining room decor with timeless farmhouse warmth.</p>

<p>This look is especially appealing because it feels collected over time. Nothing appears overly perfect. The table has texture, the shelves display treasured pieces, and the wall art adds personal history. Together, these details create a dining space that is not just beautiful, but also comfortable, welcoming, and full of soul.</p>

<div style="background:#f8fafc;border:1px solid #dbe4ee;border-radius:12px;padding:18px 20px;margin:24px 0;">
  <h3 style="margin-top:0;margin-bottom:12px;font-size:24px;line-height:1.4;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Key Takeaways</h3>
  <ul style="margin:0;padding-left:20px;">
    <li>Rustic wood furniture brings warmth, texture, and authenticity to a dining room.</li>
    <li>Open shelves are perfect for displaying blue and white plates, pitchers, framed art, and collected ceramics.</li>
    <li>Vintage botanical prints and landscape artwork help create a layered cottage-inspired wall display.</li>
    <li>Fresh greenery softens the room and makes the space feel natural and lived-in.</li>
    <li>A neutral table runner, simple candles, and handmade bowls add quiet elegance without feeling formal.</li>
  </ul>
</div>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">The Beauty of a Rustic Cottage Dining Room</h2>

<p>A rustic cottage dining room celebrates the idea that beauty can be found in age, texture, and imperfection. Instead of relying on glossy finishes or matching furniture sets, this design style leans into natural wood, handmade ceramics, antique-inspired artwork, and earthy decorative accents.</p>

<p>The result is a room that feels familiar, even if it is newly decorated. It invites people to sit down, linger over coffee, share a meal, and enjoy the quiet charm of home. This is why cottage dining room ideas continue to be so popular among homeowners who want interiors that feel both elegant and approachable.</p>

<p>At the heart of the look is balance. The rustic table and chairs create a grounded foundation, while the delicate blue and white plates bring pattern and refinement. The framed art adds an old-world touch, while fresh branches and flowers keep the space lively and organic.</p>

<p style="background:#f8fafc;border-left:4px solid #2563eb;padding:16px 18px;border-radius:10px;margin:22px 0;color:#1e293b;"><strong>Important:</strong> The most successful rustic dining rooms do not feel overly decorated. They feel curated. Each item should look like it has a reason to be there, whether it is useful, sentimental, handmade, vintage, or visually connected to the rest of the room.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Start with a Weathered Wood Dining Table</h2>

<p>The dining table is the visual anchor of the room. A long, weathered wood table instantly gives the space a rustic farmhouse feeling. The visible grain, knots, and natural imperfections create depth that newer polished furniture often lacks.</p>

<p>For a cottage-inspired dining room, look for tables with a substantial presence. Reclaimed wood, pine, oak, or distressed finishes work beautifully. The goal is not to make the table look brand new, but to let it carry a sense of history.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Pair Rustic Wood with Simple Chairs</h3>

<p>Wooden dining chairs with curved backs, cross-back details, or spindle silhouettes fit naturally into this style. They do not need to match perfectly. In fact, a slightly mixed set can make the room feel even more authentic.</p>

<p>If the chairs have woven seats, aged finishes, or traditional shapes, they will add to the cottage character. Cushions in linen, ticking stripe, or muted neutral fabric can make the seating more comfortable while keeping the look soft and relaxed.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Use a Linen Runner for Casual Elegance</h3>

<p>A simple table runner can soften a rustic wood table without hiding its texture. Linen, cotton, or loosely woven natural fabric works best. The slightly rumpled quality of linen feels right at home in a cottage dining space because it looks relaxed rather than overly formal.</p>

<p>Layering a runner down the center of the table also creates a visual path for styling. A vase, candles, bowls, and stacked plates all feel more intentional when gathered along a central textile.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Open Shelving as a Decorative Focal Point</h2>

<p>Open wooden shelves are one of the strongest features in this type of dining room. They provide storage, but more importantly, they create a place to display personality. Instead of hiding dishes behind cabinet doors, open shelves allow beautiful plates, pitchers, bowls, and artwork to become part of the decor.</p>

<p>The shelves in a rustic dining room should feel sturdy and natural. Thick wood planks with visible grain add architectural interest and complement the dining table. Darker wood tones can create contrast against light walls, while lighter woods can make the space feel airy and Scandinavian-inspired.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Decorating with Blue and White Plates</h3>

<p>Blue and white ceramics are a classic choice for cottage, farmhouse, French country, and English country interiors. Their patterned designs add color without overwhelming the room. Floral plates, transferware, porcelain pitchers, and small bowls bring a refined decorative layer to rustic wood shelving.</p>

<p>One reason blue and white decor works so well is its versatility. It pairs beautifully with warm wood, aged brass, cream pottery, greenery, and vintage artwork. The color palette feels fresh but timeless, making it a smart choice for anyone who wants a dining room that will not quickly feel outdated.</p>

<p style="background:#fff7ed;border:1px solid #fed7aa;padding:16px 18px;border-radius:10px;margin:22px 0;color:#9a3412;"><strong>Pro Tip:</strong> When styling open shelves, vary the height and shape of your pieces. Stand plates upright, place smaller bowls in front, add pitchers for height, and lean framed art behind ceramics to create depth.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Layer Functional and Decorative Pieces</h3>

<p>A well-styled shelf should include more than one type of object. Plates alone can feel repetitive, while too many small accessories can feel cluttered. The best approach is to combine practical dining pieces with decorative accents.</p>

<ul>
  <li>Large plates or platters as background pieces</li>
  <li>Pitchers and jugs for sculptural height</li>
  <li>Small bowls and cups for detail</li>
  <li>Framed sketches or landscape art for vintage charm</li>
  <li>Potted plants or branches for movement</li>
  <li>Neutral ceramics to balance patterned pieces</li>
</ul>

<p>This mix helps the shelves feel collected, not crowded. It also gives the room a more personal quality because it looks as though the objects have been gathered slowly over time.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Vintage Wall Art Adds Character</h2>

<p>Framed artwork plays an important role in creating the cottage dining room atmosphere. Small landscapes, botanical prints, sketches, and traditional scenes make the room feel layered and historic. They also help break up blank wall space beneath or around shelving.</p>

<p>Gold, brass, or aged wood frames work especially well. They add warmth and subtle shine without looking too modern. A mix of frame sizes can create a gallery effect that feels charming and informal.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Botanical Prints for a Natural Touch</h3>

<p>Botanical artwork is ideal for cottage dining room decor because it connects the interior to nature. A framed floral print, herb illustration, or vintage plant study brings softness to the wall and pairs beautifully with fresh flowers on the table.</p>

<p>These pieces do not need to be expensive. Reproductions, thrifted prints, flea market finds, or even pages from old botanical books can look beautiful when framed thoughtfully.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Landscape Art for Old-World Warmth</h3>

<p>Small landscape paintings or prints add depth and a sense of nostalgia. They work particularly well when layered on shelves or hung in groups. Their muted colors often blend naturally with rustic wood tones, cream walls, blue ceramics, and aged brass candleholders.</p>

<div style="background:#f8fafc;border:1px solid #dbe4ee;border-radius:12px;padding:18px 20px;margin:28px 0;">
  <h3 style="margin-top:0;margin-bottom:12px;font-size:24px;line-height:1.4;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Expert Insight</h3>
  <p style="margin:0;color:#334155;">A cottage dining room feels most authentic when it mixes eras. Pair newer functional pieces with antique-inspired art, old frames, handmade ceramics, and natural materials. This prevents the space from looking like a catalog and gives it a more personal, collected charm.</p>
</div>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Bring the Room to Life with Greenery</h2>

<p>Greenery is essential in a rustic dining room because it softens all the wood, ceramics, and framed decor. A tall indoor tree, leafy branches in a pitcher, or fresh flowers in a ceramic vase can immediately make the room feel more alive.</p>

<p>The beauty of this style is that greenery does not need to be formal. Loose branches, wildflowers, herbs, olive stems, eucalyptus, or seasonal clippings can all work. The arrangement should feel natural, slightly untamed, and effortless.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Use Pitchers as Vases</h3>

<p>A ceramic pitcher filled with fresh stems is one of the easiest ways to create a cottage dining table centerpiece. It feels casual, practical, and timeless. Cream, beige, stoneware, or ironstone pitchers are especially effective because they blend seamlessly with rustic and farmhouse interiors.</p>

<p>For a fuller arrangement, choose stems with small leaves or delicate flowers. Avoid overly structured bouquets if you want the room to feel relaxed and natural.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Add Height with an Indoor Tree</h3>

<p>A tall tree or large potted plant brings vertical balance to the dining room. It fills empty corners, adds movement, and makes the space feel fresh. Olive trees, ficus trees, citrus trees, and leafy branches all complement cottage and farmhouse dining room ideas.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Create a Warm Neutral Color Palette</h2>

<p>The color palette in a rustic cottage dining room should feel calm and grounded. Warm whites, creams, soft taupes, aged wood browns, muted greens, blue and white patterns, and antique brass accents work beautifully together.</p>

<p>Neutral dishes are useful for everyday meals and can be layered with patterned pieces for special occasions. The combination of plain ceramics and blue and white designs creates a balanced, timeless table.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Why a Home Coffee Bar Is Worth Creating</h2>

<p>A home coffee bar is more than a place to plug in a coffee maker. It is a small daily luxury that brings order, comfort, and style into the rhythm of everyday life. Instead of searching through cabinets for mugs, coffee pods, filters, sweeteners, and spoons, everything is gathered in one attractive, easy-to-use area.</p>

<p>The best coffee bar ideas are both practical and personal. They make room for the essentials while leaving space for decorative touches that reflect your taste. In this setup, the black cabinet provides storage and structure, the wood countertop adds warmth, and the open shelves create a cafe-style display.</p>

<p>For anyone who loves coffee, a dedicated station can make mornings smoother and more enjoyable. It can also become a welcoming spot for guests, especially when mugs, beans, and accessories are arranged in a way that feels inviting.</p>

<p style="background:#f8fafc;border-left:4px solid #2563eb;padding:16px 18px;border-radius:10px;margin:22px 0;color:#1e293b;"><strong>Important:</strong> A great home coffee bar should not only look good in photos. It should work beautifully in real life. Place your most-used items within easy reach, keep the countertop uncluttered, and use shelves or drawers to separate daily essentials from decorative accents.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Choosing the Right Furniture for a Coffee Station</h2>

<p>The base of a coffee bar matters because it determines how functional the entire setup will be. A cabinet, console table, sideboard, buffet, or kitchen cart can all work, but the best option is one that offers both surface space and storage.</p>

<p>A black cabinet with a wood countertop is a strong choice for a modern farmhouse coffee bar. The dark finish grounds the space, while the wood top keeps it from feeling too heavy. Brass or antique-style drawer pulls add a warm metallic detail that complements the rustic elements.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Look for Drawers and Open Storage</h3>

<p>Drawers are ideal for storing small coffee accessories that can easily clutter the counter. Spoons, filters, napkins, tea bags, stirrers, extra pods, and measuring scoops can all be tucked away but still remain close at hand.</p>

<p>Open lower shelves are useful for mugs, baskets, trays, and wooden crates. They provide easy access while keeping the overall design casual and homey. A woven basket can hide less attractive supplies, while a wooden box can reinforce the rustic coffee bar look.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Make Sure the Surface Is Practical</h3>

<p>The countertop should be large enough for your main coffee equipment. A drip coffee maker, espresso machine, grinder, or milk frother all need stable space. If you use more than one appliance, leave a bit of breathing room between them so the station does not feel crowded.</p>

<p>A wood surface is beautiful, but it should be protected from spills. A small tray, washable mat, or coaster under frequently used items can help preserve the finish and make cleanup easier.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Open Shelving for Style and Storage</h2>

<p>Open shelving is one of the defining features of a stylish coffee bar. It creates vertical storage, which is especially useful when the coffee station is placed in a small corner. Shelves keep everyday supplies accessible while also giving you a place to add decor, greenery, and framed signs.</p>

<p>Black shelves with wood brackets create a balanced look. The dark shelf surface ties into the cabinet and appliances, while the wood brackets echo the countertop and floor. This repetition makes the whole coffee station feel cohesive rather than pieced together.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Use Glass Jars for Coffee Bar Organization</h3>

<p>Clear glass jars are both beautiful and practical. They let you see what you have at a glance, which makes refilling easier. Coffee beans, ground coffee, sugar, cocoa powder, creamer powder, cinnamon sticks, tea bags, and cookies can all be stored in jars depending on your daily habits.</p>

<p>Wooden lids add warmth and keep the jars from looking too modern or clinical. When several jars are lined up together, they create a clean, organized visual rhythm across the shelf.</p>

<h3 style="font-size:24px;line-height:1.4;margin:28px 0 14px;color:#1e293b;font-weight:700;padding-left:12px;border-left:4px solid #cbd5e1;">Decorate the Top Shelf with Personality</h3>

<p>The top shelf is a perfect place for coffee-themed wall art, potted plants, trailing greenery, and decorative baskets. A framed sign with a playful coffee quote can instantly set the mood and make the station feel personal.</p>

<p>Because the top shelf is higher, it works best for items that do not need to be handled constantly. Plants, art, and decorative containers are better choices than supplies you reach for every morning.</p>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Balancing Black Furniture with Natural Texture</h2>

<h2 style="font-size:30px;line-height:1.3;margin:36px 0 18px;color:#0f172a;border-bottom:2px solid #e2e8f0;padding-bottom:10px;font-weight:700;">Coffee Bar Wall Decor That Adds Charm</h2>

        // Function to render a static page (like Privacy Policy)
        function renderPage(pageId) {
            const page = pages[pageId];

            if (!page) {
                app.innerHTML = `<p style="color: var(--text-color);">Page not found.</p><a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>`;
                return;

                        <h1>${page.title}</h1>
                        ${page.content}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0); // Scroll to top
        }

        // Function to render a single post
        function renderPost(postId) {
            const post = posts.find(p => p.id === postId);

            if (!post) {
                app.innerHTML = `<p style="color: var(--text-color);">Post not found.</p><a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>`;
                return;
            }

            app.innerHTML = `
                <a class="back-button" onclick="navigate('home')">&larr; Back to Dashboard</a>
                <div class="single-post">
                    <div class="post-header">
                        <img class="avatar" src="${avatarUrl}" alt="Avatar">
                        <span class="username">${blogUsername}</span>
                    </div>
                    <img class="post-image" src="${post.image}" alt="${post.title}" onerror="this.onerror=null; this.src='https://via.placeholder.com/540x400?text=Image+Not+Found'">

            `;

        // Simple router/navigator
        function navigate(view, id = null) {
            if (view === 'home') {
                window.location.hash = '';
                renderHome();
            } else if (view === 'post') {
                window.location.hash = id;
                renderPost(id);
            } else if (view === 'page') {
                window.location.hash = id;
                renderPage(id);
            }
        }

        // Listen for browser back/forward buttons
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                // Check if the hash matches a static page, otherwise assume it's a post
                if (pages[hash]) {
                    renderPage(hash);
                } else {
                    renderPost(hash);
                }
            } else {
                renderHome();
            }
        });

        // Initial Load
        const initialHash = window.location.hash.replace('#', '');
        if (initialHash) {
            if (pages[initialHash]) {
                renderPage(initialHash);
            } else {
                renderPost(initialHash);
            }
        } else {
            renderHome();
